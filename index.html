    "type": "text",
    "x": 28,

    "h": 50,
    "z": 235,
    "html": "<span style=\"font-size:13px;letter-spacing:1.5px;\">&nbsp;&nbsp;&nbsp;&nbsp;针对页岩中流固相互作用导致核磁信号识别困难问题，利用分子模拟技术再现高温高压地层环境下页岩油赋存状态，并将所得模拟轨迹用于核磁共振弛豫研究，获得实际测量中难以准确测量的核磁数据</span>"

  },
  {

    "type": "text",
    "x": 21,
    "y": 3186,
    "w": 770,
    "h": 22,
    "z": 247,
    "html": "<span style=\"font-size:13px;letter-spacing:1.5px;\">&lt;利用 <b>MS</b> 软件构建纳米页岩油孔隙，并通过 Lammps 软件模拟计算页岩油赋存状态的分子动力学</span>"
  },
  {
    "id": "ppt_t_1774967420832_6480",
    "type": "text",
    "x": 21,
    "y": 3214,
    "w": 770,
    "h": 22,
    "z": 248,
    "html": "<span style=\"font-size:13px;letter-spacing:1.5px;\">&lt;利用 <b>VMD，Python</b> 等软件将核磁共振理论与分子模拟结果结合编写脚本，分析计算核磁共振弛豫结果</span>"
  },
  {
    "id": "ppt_t_1774967420832_7170",
    "type": "text",
    "x": 22,
    "y": 3239,
    "w": 770,
    "h": 22,
    "z": 249,
    "html": "<span style=\"font-size:13px;letter-spacing:1.5px;\">&lt;提出并完成不同温度条件下分层弛豫行为的研究等论文核心创新点，并在刘冰教授团队指导下完成论文撰写工作</span>"
  },

  },
  {

    "x": 34,
    "y": 3465,
    "w": 770,
    "h": 60,
    "z": 252,
    "html": "<span style=\"font-size:13px;line-height:1.7;letter-spacing:1.5px;\">&nbsp;&nbsp;课题方向新颖，整体研究基础薄弱。在核心代码构建之前，课题组仅有一篇相关论文可供参考，且师兄所搭建的模型尚不完善，仍存在较大问题，研究起步阶段面临较高的不确定性与技术难度</span>"
  },

    "html": "<span style=\"font-size:12px;color:#666;letter-spacing:1.5px;\">ps：本人对顾师兄十分软佩，顾师兄还是非常非常厉害的，博士四年从零到有构建起完整的核磁代码，是课题组绝对主力</span>"

    "x": 30,

    "w": 770,
    "h": 60,
    "z": 258,
    "html": "<span style=\"font-size:13px;line-height:1.7;letter-spacing:1.5px;\">&nbsp;&nbsp;&nbsp;&nbsp;  所在课题组资及硬件资源有限，本人作为编外人员，暂未分配工位，在研究过程中难以随时获得导师或学长的直接指导。面对新设课题，导师事务繁忙、指导时间有限，本人更多依靠<strong>自主</strong>学习与独立探索推进研究，在克服困难的过程中持续提升解决问题的能力</span>"

  {

    "h": 796,
    "z": 339,
    "html": "\n<p class=\"MsoNormal\" style=\"line-height:150%;layout-grid-mode:char;mso-layout-grid-align:\nnone\"><span lang=\"EN-US\" style=\"font-family:&quot;Times New Roman&quot;,serif\">Nuclear-</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">magnetic resonance (NMR) is widely used to characterize fluids in shale oil</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> </span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">r</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">eservoirs, yet resolving weakly adsorbed transition states in nanoporous</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> </span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">s</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ystems remains challenging. This difficulty arises from nanoscale confinement,</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> </span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">signal overlap, and limited density contrast, which obscure the correspondence</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> b</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">etween NMR responses and local fluid occurrence. In this study, molecular</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> d</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ynamics simulations coupled with NMR relaxation theory were employed to</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> i</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">nvestigate n-octane confined in hydroxylated quartz nanopores under reservoir</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> c</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">onditions. A layer-resolved </span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">1</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">/</span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">2</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">relaxation framework was established to distinguish surface-affected, weakly</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> a</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">dsorbed transition, and bulk-like regions beyond conventional bulk-averaged</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> d</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">escriptions. Unlike conventional density-based classification, this framework</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> d</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">irectly tests whether a geometrically adsorbed layer remains dynamically</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> a</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">dsorption-dominated or has already evolved toward free-like relaxation</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> b</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ehavior. The results show that quartz confinement produces distinct</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> l</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ayer-specific </span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">1</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">/</span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">2</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> signatures, reflecting</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> d</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ifferences in molecular packing, orientational ordering, and</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> i</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">ntra-/intermolecular relaxation contributions. In particular, the fourth</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> a</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">dsorption layer still appears as a density-defined near-wall layer, but its </span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">1</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">/</span><i style=\"font-family: &quot;Times New Roman&quot;, serif;\">T</i><sub style=\"font-family: &quot;Times New Roman&quot;, serif;\">2</sub><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> v</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">alue and relaxation characteristics approach those of the bulk-like region,</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> r</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">evealing a structurally adsorbed but dynamically free-like transition state.</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> T</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">emperature-dependent analysis further demonstrates that this transition layer</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"> p</span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">rogressively loses its density contrast at elevated temperature, whereas its</span></p><span style=\"font-family: &quot;Times New Roman&quot;, serif;\"><p class=\"MsoNormal\" style=\"line-height:150%;layout-grid-mode:char;mso-layout-grid-align:\nnone\"><span lang=\"EN-US\" style=\"font-family:&quot;Times New Roman&quot;,serif\">evolution toward a bulk-like free state remains clearly traceable by <i>T</i><sub>1</sub>/<i>T</i><sub>2</sub>.</span> Quantitative relationships were further established among <i>T</i><sub>1</sub>/<i>T</i><sub>2</sub>, pore size, and the free-to-adsorbed oil ratio. These relationships demonstrate that layer-resolved relaxation analysis can bridge molecular occurrence states and experimentally relevant NMR responses. Overall, these results show that layer-resolved <i>T</i><sub>1</sub>/<i>T</i><sub>2</sub> is not merely a quantitative descriptor of confined-oil partitioning, but also a sensitive probe for resolving weakly adsorbed transition-layer dynamics and their thermal evolution in hydroxylated quartz nanopores.</p></span><span style=\"font-family: &quot;Times New Roman&quot;, serif;\">\n\n<p class=\"MsoNormal\" style=\"line-height:150%;layout-grid-mode:char;mso-layout-grid-align:\nnone\"><b><span lang=\"EN-US\" style=\"font-family: &quot;Times New Roman&quot;, serif;\">&nbsp;</span></b></p>\n</span>\n"
  },

  <script>

function createEl(d){
  var el = document.createElement('div');
  el.className = 'el';
  el.style.cssText = 'left:'+d.x+'px;top:'+d.y+'px;width:'+d.w+'px;'+(d.type==='text'?'min-height':'height')+':'+d.h+'px;z-index:'+(d.z||10)+';';

  if(d.type === 'text'){
    var inner = document.createElement('div');
    inner.className = 'el-text';
    inner.innerHTML = d.html || '';
    el.appendChild(inner);

  } else if(d.type === 'image'){
    var wrap = document.createElement('div');
    wrap.className = 'el-img-wrap';
    var img = document.createElement('img');
    img.className = 'el-img';
    img.src = d.src || '';
    img.alt = '';
    wrap.appendChild(img);
    el.appendChild(wrap);

  } else if(d.type === 'rect'){
    var rectDiv = document.createElement('div');
    rectDiv.className = 'el-rect';
    if(d.color) rectDiv.style.borderColor = d.color;
    if(d.borderWidth) rectDiv.style.borderWidth = d.borderWidth + 'px';
    el.appendChild(rectDiv);

  } else if(d.type === 'star'){
    var starDiv = document.createElement('div');
    starDiv.className = 'el-star';
    starDiv.textContent = d.char || '★';
    if(d.color) starDiv.style.color = d.color;
    if(d.fontSize) starDiv.style.fontSize = d.fontSize + 'px';
    el.appendChild(starDiv);

  } else if(d.type === 'line'){
    var lw = document.createElement('div');
    lw.className = 'el-line';
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('preserveAspectRatio','none');
    var ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','50%');
    ln.setAttribute('x2','100%'); ln.setAttribute('y2','50%');
    ln.setAttribute('stroke', d.color || '#2c3e50');
    ln.setAttribute('stroke-width','2');
    svg.appendChild(ln); lw.appendChild(svg); el.appendChild(lw);
  }

  return el;
}

window.addEventListener('DOMContentLoaded', function(){
  var slide = document.getElementById('slide');
  if(!slide || typeof INIT_ELEMENTS === 'undefined') return;
  INIT_ELEMENTS.forEach(function(d){
    slide.appendChild(createEl(d));
  });
  // 自动计算画布高度
  var maxBottom = 1123;
  slide.querySelectorAll('.el').forEach(function(el){
    var b = (parseInt(el.style.top)||0) + (parseInt(el.style.minHeight||el.style.height)||0);
    if(b > maxBottom) maxBottom = b;
  });
  var pages = Math.ceil((maxBottom + 80) / 1123);
  slide.style.minHeight = Math.max(1123, pages * 1123) + 'px';
});

  </script>
